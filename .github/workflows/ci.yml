name: ci
on:
  push: { branches: [main] }
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ['1.24', 'stable']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '${{ matrix.go }}' }
      - run: go vet ./...
      - run: go test -race ./...
      - run: go build ./...
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        # Pin to the module's Go floor: golangci-lint typechecks against this
        # toolchain's stdlib, and a newer "stable" (1.26+) trips its bundled
        # typechecker on fips140only_go1.26.go.
        with: { go-version: '1.24' }
      - uses: golangci/golangci-lint-action@v6
        # v1.64.x is built with go1.24, so it can load a go1.24 module.
        with: { version: v1.64.8 }
